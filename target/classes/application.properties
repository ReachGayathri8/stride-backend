# Server
server.port=${PORT:8080}

# H2 in-memory DB (dev - no setup needed)
spring.datasource.url=jdbc:h2:mem:strideai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=root
spring.datasource.password=root123
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT
app.jwt.secret=stride-ai-super-secret-key-change-in-production-must-be-256-bits
app.jwt.expiration-ms=900000

# CORS
app.cors.allowed-origins=http://localhost:3000,https://stride-ai.vercel.app
logging.level.com.strideai=INFO
logging.level.org.springframework.security=WARN
