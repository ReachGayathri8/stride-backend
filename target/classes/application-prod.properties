# Database — set these as env vars on Render
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 disabled in prod
spring.h2.console.enabled=false

# JWT — set JWT_SECRET as env var on Render
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# CORS — set CORS_ORIGINS as env var on Render
# Example value: https://your-app.vercel.app,http://localhost:3000
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Server
server.port=${PORT:8080}

# Logging
logging.level.com.strideai=INFO
logging.level.org.springframework.security=WARN